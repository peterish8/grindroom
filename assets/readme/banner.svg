<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-label="GrindRoom banner">
  <defs>
    <!-- smooth solid base — no banding -->
    <radialGradient id="bgBase" cx="75%" cy="20%" r="85%">
      <stop offset="0%" stop-color="#101100"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </radialGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4fe42"/>
      <stop offset="100%" stop-color="#9fc41a"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#2e3318"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="1" y="1" width="1198" height="378" rx="23" ry="23"/>
    </clipPath>
    <clipPath id="logoRound">
      <rect x="72" y="44" width="84" height="84" rx="20"/>
    </clipPath>
    <radialGradient id="goalAmbient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8F135" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#C8F135" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C8F135" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goalDisc" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <linearGradient id="goalArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8ff6a"/>
      <stop offset="55%" stop-color="#C8F135"/>
      <stop offset="100%" stop-color="#7a9e12"/>
    </linearGradient>
    <filter id="goalGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- outer rounded border -->
  <rect x="0.5" y="0.5" width="1199" height="379" rx="24" ry="24" fill="url(#bgBase)" stroke="url(#border)" stroke-width="1"/>

  <g clip-path="url(#clip)">
    <rect x="1" y="1" width="1198" height="378" fill="url(#bgBase)"/>

    <!-- left accent -->
    <rect x="1" y="1" width="3" height="376" rx="1.5" fill="url(#lime)" opacity="0.9"/>

    <!-- ═══ daily goal — 5-segment animated ring ═══ -->
    <g transform="translate(930, 190)">
      <!-- ambient glow -->
      <circle r="92" fill="url(#goalAmbient)">
        <animate attributeName="opacity" values="0.55;0.95;0.55" dur="2.8s" repeatCount="indefinite"/>
      </circle>

      <!-- slow rotating outer ticks -->
      <g opacity="0.35">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="48s" repeatCount="indefinite"/>
        <g stroke="#3a3a3a" stroke-width="1.5" stroke-linecap="round">
          <line y1="-86" y2="-80"/><line y1="-86" y2="-80" transform="rotate(30)"/>
          <line y1="-86" y2="-80" transform="rotate(60)"/><line y1="-86" y2="-80" transform="rotate(90)"/>
          <line y1="-86" y2="-80" transform="rotate(120)"/><line y1="-86" y2="-80" transform="rotate(150)"/>
          <line y1="-86" y2="-80" transform="rotate(180)"/><line y1="-86" y2="-80" transform="rotate(210)"/>
          <line y1="-86" y2="-80" transform="rotate(240)"/><line y1="-86" y2="-80" transform="rotate(270)"/>
          <line y1="-86" y2="-80" transform="rotate(300)"/><line y1="-86" y2="-80" transform="rotate(330)"/>
        </g>
      </g>

      <!-- segment tracks (5 slots) -->
      <circle r="78" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" stroke-dasharray="92.5 397.6" transform="rotate(-88)"/>
      <circle r="78" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" stroke-dasharray="92.5 397.6" transform="rotate(-16)"/>
      <circle r="78" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" stroke-dasharray="92.5 397.6" transform="rotate(56)"/>
      <circle r="78" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" stroke-dasharray="92.5 397.6" transform="rotate(128)"/>
      <circle r="78" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" stroke-dasharray="92.5 397.6" transform="rotate(200)"/>

      <!-- soft glow under progress -->
      <g filter="url(#goalGlow)" opacity="0.65">
        <circle r="78" fill="none" stroke="#C8F135" stroke-width="12" stroke-linecap="round" stroke-dasharray="92.5 397.6" transform="rotate(-88)"/>
        <circle r="78" fill="none" stroke="#C8F135" stroke-width="12" stroke-linecap="round" stroke-dasharray="92.5 397.6" transform="rotate(-16)"/>
        <circle r="78" fill="none" stroke="#C8F135" stroke-width="12" stroke-linecap="round" stroke-dasharray="92.5 397.6" transform="rotate(56)"/>
        <circle r="78" fill="none" stroke="#C8F135" stroke-width="12" stroke-linecap="round" stroke-dasharray="92.5 397.6" transform="rotate(128)"/>
        <circle r="78" fill="none" stroke="#C8F135" stroke-width="12" stroke-linecap="round" stroke-dasharray="92.5 397.6" transform="rotate(200)"/>
      </g>

      <!-- filled segments with staggered sweep-in loop -->
      <circle r="78" fill="none" stroke="url(#goalArc)" stroke-width="10" stroke-linecap="round" stroke-dasharray="92.5 397.6" stroke-dashoffset="92.5" transform="rotate(-88)">
        <animate attributeName="stroke-dashoffset" values="92.5;0;0;92.5" keyTimes="0;0.12;0.88;1" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle r="78" fill="none" stroke="url(#goalArc)" stroke-width="10" stroke-linecap="round" stroke-dasharray="92.5 397.6" stroke-dashoffset="92.5" transform="rotate(-16)">
        <animate attributeName="stroke-dashoffset" values="92.5;92.5;0;0;92.5" keyTimes="0;0.12;0.24;0.88;1" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle r="78" fill="none" stroke="url(#goalArc)" stroke-width="10" stroke-linecap="round" stroke-dasharray="92.5 397.6" stroke-dashoffset="92.5" transform="rotate(56)">
        <animate attributeName="stroke-dashoffset" values="92.5;92.5;92.5;0;0;92.5" keyTimes="0;0.24;0.36;0.48;0.88;1" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle r="78" fill="none" stroke="url(#goalArc)" stroke-width="10" stroke-linecap="round" stroke-dasharray="92.5 397.6" stroke-dashoffset="92.5" transform="rotate(128)">
        <animate attributeName="stroke-dashoffset" values="92.5;92.5;92.5;92.5;0;0;92.5" keyTimes="0;0.36;0.48;0.6;0.72;0.88;1" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle r="78" fill="none" stroke="url(#goalArc)" stroke-width="10" stroke-linecap="round" stroke-dasharray="92.5 397.6" stroke-dashoffset="92.5" transform="rotate(200)">
        <animate attributeName="stroke-dashoffset" values="92.5;92.5;92.5;92.5;92.5;0;0;92.5" keyTimes="0;0.48;0.6;0.72;0.8;0.88;0.96;1" dur="5s" repeatCount="indefinite"/>
      </circle>

      <!-- completion pulse ring -->
      <circle r="78" fill="none" stroke="#C8F135" stroke-width="2" opacity="0">
        <animate attributeName="r" values="78;86;78" keyTimes="0;0.5;1" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0;0.45;0" keyTimes="0;0.82;0.9;1" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="stroke-width" values="2;0.5;2" keyTimes="0;0.5;1" dur="5s" repeatCount="indefinite"/>
      </circle>

      <!-- inner disc -->
      <circle r="58" fill="url(#goalDisc)" stroke="rgba(200,241,53,0.18)" stroke-width="1.5"/>

      <!-- center label -->
      <text y="-4" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="34" font-weight="900" font-variant="tabular-nums">5/5</text>
      <text y="18" text-anchor="middle" fill="#666" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.8">GOAL</text>

      <!-- orbiting highlight -->
      <circle r="4" fill="#e8ff6a" opacity="0.9">
        <animateMotion dur="4s" repeatCount="indefinite" path="M 0,-78 A 78,78 0 1,1 0,78 A 78,78 0 1,1 0,-78"/>
      </circle>
    </g>

    <!-- ═══ left content ═══ -->
    <rect x="72" y="44" width="84" height="84" rx="20" fill="#0e0e0e" stroke="#262626" stroke-width="1"/>
    <!-- app logo: concentric rings (inline vector � GitHub strips embedded raster images) -->
    <g clip-path="url(#logoRound)">
      <g transform="translate(114, 86)">
        <circle r="36" fill="none" stroke="#c8c8c8" stroke-width="1.6"/>
        <circle r="22" fill="none" stroke="#c8c8c8" stroke-width="1.6"/>
        <circle r="8"  fill="none" stroke="#c8c8c8" stroke-width="1.6"/>
      </g>
    </g>

    <text x="72" y="210" fill="#ffffff" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="54" font-weight="900" letter-spacing="-2.5">
      Grind<tspan fill="url(#lime)">Room</tspan>
    </text>

    <text x="72" y="256" fill="#8a8a8a" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="16" font-weight="500">
      Log workouts  ·  Build streaks  ·  Compete with your squad
    </text>

    <g transform="translate(72, 298)">
      <rect width="168" height="40" rx="10" fill="#111" stroke="#222" stroke-width="1"/>
      <circle cx="22" cy="20" r="4" fill="#C8F135"/>
      <text x="36" y="25" fill="#bbb" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="600">5 workouts / day</text>
    </g>

    <g transform="translate(256, 298)">
      <rect width="168" height="40" rx="10" fill="#111" stroke="#222" stroke-width="1"/>
      <text x="84" y="25" text-anchor="middle" fill="#C8F135" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="800">10 · 20 · 30 pts</text>
    </g>

    <g transform="translate(440, 298)">
      <rect width="168" height="40" rx="10" fill="#111" stroke="rgba(200,241,53,0.25)" stroke-width="1"/>
      <circle cx="22" cy="20" r="4" fill="#C8F135">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="36" y="25" fill="#bbb" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="600">Live leaderboards</text>
    </g>

    <text x="72" y="356" fill="#3a3a3a" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5">
      FITNESS ACCOUNTABILITY  ·  REACT NATIVE  ·  CONVEX
    </text>
  </g>
</svg>