<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 100" role="img" aria-label="GrindRoom scoring tiers">
  <defs>
    <linearGradient id="sLime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8ff4a"/>
      <stop offset="100%" stop-color="#7a9e12"/>
    </linearGradient>
  </defs>
  <g transform="translate(20, 10)">
    <rect width="200" height="80" rx="18" fill="#141414" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="100" y="30" text-anchor="middle" fill="#666" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">BEGINNER</text>
    <text x="100" y="62" text-anchor="middle" fill="#aaa" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="32" font-weight="900">10</text>
    <text x="138" y="58" fill="#555" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="14" font-weight="600">pts</text>
  </g>
  <g transform="translate(250, 10)">
    <rect width="200" height="80" rx="18" fill="#141414" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="100" y="30" text-anchor="middle" fill="#666" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">MEDIUM</text>
    <text x="100" y="62" text-anchor="middle" fill="#C8F135" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="32" font-weight="900">20</text>
    <text x="138" y="58" fill="#555" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="14" font-weight="600">pts</text>
  </g>
  <g transform="translate(480, 10)">
    <rect width="200" height="80" rx="18" fill="#141414" stroke="url(#sLime)" stroke-width="2"/>
    <rect x="2" y="2" width="196" height="76" rx="16" fill="#C8F135" opacity="0.04"/>
    <text x="100" y="30" text-anchor="middle" fill="#888" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">ADVANCED</text>
    <text x="100" y="62" text-anchor="middle" fill="url(#sLime)" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="32" font-weight="900">30</text>
    <text x="138" y="58" fill="#555" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="14" font-weight="600">pts</text>
  </g>
</svg>