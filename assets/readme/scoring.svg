<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 128" role="img" aria-label="GrindRoom scoring tiers">
  <defs>
    <linearGradient id="sLime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8ff6a"/>
      <stop offset="55%" stop-color="#C8F135"/>
      <stop offset="100%" stop-color="#7a9e12"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="cardHot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1f12"/>
      <stop offset="100%" stop-color="#101100"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- connector arrows -->
  <g fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round">
    <line x1="222" y1="64" x2="246" y2="64"/>
    <polygon points="246,60 254,64 246,68" fill="#333" stroke="none"/>
    <line x1="452" y1="64" x2="476" y2="64"/>
    <polygon points="476,60 484,64 476,68" fill="#C8F135" stroke="none" opacity="0.55"/>
  </g>

  <!-- BEGINNER -->
  <g transform="translate(16, 16)">
    <rect width="206" height="96" rx="18" fill="url(#card)" stroke="#262626" stroke-width="1.5"/>
    <!-- difficulty: 1 bar -->
    <g transform="translate(24, 22)">
      <rect x="0" y="0" width="28" height="5" rx="2.5" fill="#333"/>
      <rect x="0" y="0" width="10" height="5" rx="2.5" fill="#555"/>
    </g>
    <text x="103" y="36" text-anchor="middle" fill="#555" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.6">BEGINNER</text>
    <text x="88" y="72" text-anchor="middle" fill="#b0b0b0" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="36" font-weight="900" font-variant="tabular-nums">10</text>
    <text x="118" y="68" fill="#444" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="13" font-weight="700">pts</text>
    <text x="103" y="92" text-anchor="middle" fill="#3a3a3a" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5">warm-up level</text>
  </g>

  <!-- MEDIUM -->
  <g transform="translate(246, 16)">
    <rect width="206" height="96" rx="18" fill="url(#card)" stroke="rgba(200,241,53,0.22)" stroke-width="1.5"/>
    <rect x="1" y="1" width="204" height="94" rx="17" fill="#C8F135" opacity="0.03"/>
    <!-- difficulty: 2 bars -->
    <g transform="translate(24, 22)">
      <rect x="0" y="0" width="28" height="5" rx="2.5" fill="#222"/>
      <rect x="0" y="0" width="10" height="5" rx="2.5" fill="#C8F135" opacity="0.45"/>
      <rect x="14" y="0" width="10" height="5" rx="2.5" fill="#C8F135" opacity="0.75"/>
    </g>
    <text x="103" y="36" text-anchor="middle" fill="#888" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.6">MEDIUM</text>
    <text x="88" y="72" text-anchor="middle" fill="#C8F135" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="36" font-weight="900" font-variant="tabular-nums">20</text>
    <text x="118" y="68" fill="#555" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="13" font-weight="700">pts</text>
    <text x="103" y="92" text-anchor="middle" fill="#444" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5">solid effort</text>
  </g>

  <!-- ADVANCED -->
  <g transform="translate(476, 16)" filter="url(#glow)">
    <rect width="206" height="96" rx="18" fill="url(#cardHot)" stroke="url(#sLime)" stroke-width="2"/>
    <rect x="2" y="2" width="202" height="92" rx="16" fill="#C8F135" opacity="0.06"/>
    <!-- difficulty: 3 bars -->
    <g transform="translate(24, 22)">
      <rect x="0" y="0" width="42" height="5" rx="2.5" fill="#1a1a1a"/>
      <rect x="0" y="0" width="10" height="5" rx="2.5" fill="url(#sLime)"/>
      <rect x="14" y="0" width="10" height="5" rx="2.5" fill="url(#sLime)"/>
      <rect x="28" y="0" width="10" height="5" rx="2.5" fill="url(#sLime)"/>
    </g>
    <text x="103" y="36" text-anchor="middle" fill="#C8F135" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="800" letter-spacing="1.6">ADVANCED</text>
    <text x="88" y="72" text-anchor="middle" fill="url(#sLime)" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="36" font-weight="900" font-variant="tabular-nums">30</text>
    <text x="118" y="68" fill="#666" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="13" font-weight="700">pts</text>
    <text x="103" y="92" text-anchor="middle" fill="#5a5a3a" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5">max grind</text>
    <!-- pulse dot -->
    <circle cx="182" cy="24" r="3" fill="#C8F135">
      <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>