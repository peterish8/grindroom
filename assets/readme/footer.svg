<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 170" role="img" aria-label="GrindRoom footer">
  <defs>
    <linearGradient id="fLime" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8F135" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C8F135" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#C8F135" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C8F135" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4fe42"/>
      <stop offset="100%" stop-color="#9bc41a"/>
    </linearGradient>
  </defs>

  <!-- top rule -->
  <line x1="80" y1="24" x2="820" y2="24" stroke="url(#fLime)" stroke-width="1"/>

  <!-- center badge: logo from logo.png (inline vector for GitHub README) -->
  <g transform="translate(450, 62)">
    <rect x="-28" y="-28" width="56" height="56" rx="14" fill="#000000" stroke="#2a2a2a" stroke-width="1"/>
    <g fill="#C8F135" stroke="#C8F135">
      <path fill="#C8F135" stroke="none" d="M0,-16 L-5,-8 L-2,-11 L0,-5 L2,-11 L5,-8 Z"/>
      <rect x="-14" y="-1" width="28" height="4" rx="1" fill="#C8F135" stroke="none"/>
      <circle cx="-17" cy="1" r="6" fill="none" stroke-width="2.2"/>
      <circle cx="-21" cy="1" r="4" fill="none" stroke-width="1.8"/>
      <rect x="-24" y="-1.5" width="3" height="4" rx="0.5" fill="#C8F135" stroke="none"/>
      <circle cx="17" cy="1" r="6" fill="none" stroke-width="2.2"/>
      <circle cx="21" cy="1" r="4" fill="none" stroke-width="1.8"/>
      <rect x="21" y="-1.5" width="3" height="4" rx="0.5" fill="#C8F135" stroke="none"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="450" y="118" text-anchor="middle" fill="#fff" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="18" font-weight="800" letter-spacing="-0.5">
    Grind<tspan fill="url(#badge)">Room</tspan>
  </text>

  <!-- tagline -->
  <text x="450" y="138" text-anchor="middle" fill="#555" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="500">
    Built with discipline  ·  Shipped with Convex
  </text>

  <!-- bottom meta -->
  <line x1="280" y1="148" x2="620" y2="148" stroke="#1e1e1e" stroke-width="1"/>
  <text x="450" y="162" text-anchor="middle" fill="#555" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">© 2026</text>
</svg>