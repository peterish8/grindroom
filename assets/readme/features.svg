<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 220" role="img" aria-label="GrindRoom features">
  <defs>
    <linearGradient id="gLime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8ff4a"/>
      <stop offset="100%" stop-color="#8eb012"/>
    </linearGradient>
    <linearGradient id="gCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- shared card template positions -->
  <!-- Card 1: Log -->
  <g transform="translate(30, 20)">
    <rect width="240" height="180" rx="24" fill="url(#gCard)" stroke="#262626" stroke-width="1.5"/>
    <rect x="1" y="1" width="238" height="56" rx="23" fill="#C8F135" opacity="0.04"/>
    <circle cx="120" cy="58" r="34" fill="#1a2200" stroke="#2e3500" stroke-width="1.5"/>
    <g transform="translate(120, 58)" stroke="url(#gLime)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M-14 6h28M-14 6v-14a6 6 0 0 1 6-6h16a6 6 0 0 1 6 6v14" transform="translate(0,-2)"/>
      <path d="M-10 6v8a4 4 0 0 0 4 4h12a4 4 0 0 0 4-4V6" transform="translate(0,-2)"/>
      <path d="M-6 14h20" stroke="#C8F135" stroke-width="2"/>
      <path d="M-2 18l4 4 8-10" stroke="#C8F135" stroke-width="2.5"/>
    </g>
    <text x="120" y="118" text-anchor="middle" fill="#fff" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" font-weight="800">Log Workouts</text>
    <text x="120" y="140" text-anchor="middle" fill="#666" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="500">10 presets · 3 levels</text>
    <rect x="72" y="154" width="96" height="6" rx="3" fill="#222"/>
    <rect x="72" y="154" width="72" height="6" rx="3" fill="url(#gLime)"/>
  </g>

  <!-- Card 2: Streak -->
  <g transform="translate(290, 20)">
    <rect width="240" height="180" rx="24" fill="url(#gCard)" stroke="#262626" stroke-width="1.5"/>
    <circle cx="120" cy="58" r="34" fill="#1a2200" stroke="#2e3500" stroke-width="1.5"/>
    <g transform="translate(120, 54)" filter="url(#iconGlow)">
      <path d="M0-18C4-10 10-8 12 2C16-2 22-4 24 8C30 6 34 14 34 24C34 40 20 52 8 52C-4 52-16 40-16 24C-16 10-8 4 0-18Z" fill="url(#gLime)"/>
      <path d="M-2 30C-2 22 2 18 6 8C10 16 14 16 16 22C20 18 24 22 24 30C24 38 18 44 10 44C4 44-2 38-2 30Z" fill="#121212"/>
    </g>
    <text x="120" y="118" text-anchor="middle" fill="#fff" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" font-weight="800">Streak Engine</text>
    <text x="120" y="140" text-anchor="middle" fill="#666" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="500">Daily consistency</text>
    <text x="120" y="162" text-anchor="middle" fill="#888" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1">CURRENT</text>
    <text x="120" y="182" text-anchor="middle" fill="#C8F135" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="22" font-weight="900">12 days</text>
  </g>

  <!-- Card 3: Rooms -->
  <g transform="translate(550, 20)">
    <rect width="240" height="180" rx="24" fill="url(#gCard)" stroke="#262626" stroke-width="1.5"/>
    <circle cx="120" cy="58" r="34" fill="#1a2200" stroke="#2e3500" stroke-width="1.5"/>
    <g transform="translate(120, 58)" fill="none" stroke="url(#gLime)" stroke-width="2.5" stroke-linecap="round">
      <circle cx="-18" cy="-4" r="10" fill="#141414"/>
      <circle cx="18" cy="-4" r="10" fill="#141414"/>
      <circle cx="0" cy="-18" r="10" fill="#141414" stroke="#C8F135"/>
      <path d="M-28 14h56" stroke="#444"/>
      <path d="M-28 14h38" stroke="#C8F135"/>
      <path d="M-18 2v8M18 2v8M0-8v8" stroke="#555" stroke-width="2"/>
    </g>
    <text x="120" y="118" text-anchor="middle" fill="#fff" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" font-weight="800">Squad Rooms</text>
    <text x="120" y="140" text-anchor="middle" fill="#666" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="500">Live leaderboards</text>
    <g transform="translate(78, 152)">
      <rect width="84" height="22" rx="11" fill="#0e0e0e" stroke="#2a2a2a"/>
      <text x="42" y="15" text-anchor="middle" fill="#C8F135" font-family="ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="2">ABC123</text>
    </g>
  </g>

  <!-- Card 4: Realtime (highlighted) -->
  <g transform="translate(810, 20)">
    <rect width="240" height="180" rx="24" fill="url(#gCard)" stroke="rgba(200,241,53,0.35)" stroke-width="2"/>
    <rect x="2" y="2" width="236" height="176" rx="22" fill="none" stroke="#C8F135" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="120" cy="58" r="34" fill="#1a2200" stroke="rgba(200,241,53,0.4)" stroke-width="1.5"/>
    <g transform="translate(120, 58)" fill="none" stroke="url(#gLime)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0-14v6M-10-8l4 4M10-8l-4 4"/>
      <circle cx="0" cy="4" r="14" stroke="#444"/>
      <path d="M0-6v-2M0 14v2" stroke="#C8F135"/>
      <path d="M-10 4h20" stroke="#555"/>
      <path d="M-10 4a10 10 0 0 1 20 0" stroke="#C8F135">
        <animate attributeName="stroke-dasharray" values="0 40;20 20;0 40" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(168, 30)">
      <circle r="5" fill="#C8F135">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <text x="10" y="5" fill="#C8F135" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="900">LIVE</text>
    </g>
    <text x="120" y="118" text-anchor="middle" fill="#fff" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" font-weight="800">Realtime Sync</text>
    <text x="120" y="140" text-anchor="middle" fill="#666" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12" font-weight="500">Powered by Convex</text>
    <g transform="translate(60, 154)">
      <rect width="120" height="8" rx="4" fill="#222"/>
      <rect width="90" height="8" rx="4" fill="url(#gLime)">
        <animate attributeName="width" values="60;110;80;90" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>